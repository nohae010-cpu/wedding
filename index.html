<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom,#fdf6f0,#ffe4e1);
    text-align:center;
    color:#444;
}

.container{
    padding:30px;
}

h1{
    color:#c77d7d;
    font-size:40px;
}

.date{
    font-size:24px;
    margin:20px 0;
}

img{
    width:250px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    max-width:500px;
    margin:auto;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

button{
    background:#c77d7d;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>💍 Wedding Invitation</h1>

<div class="card">

<img src="https://via.placeholder.com/250" alt="couple">

<h2>أهلاً بكم</h2>

<p>
يسعدنا دعوتكم لحضور حفل زفافنا
</p>

<div class="date">
17 / 7 / 2026
</div>

<p>
نتشرف بحضوركم ومشاركتنا هذه المناسبة السعيدة ❤️
</p>

<button>ننتظركم</button>

</div>

</div>

</body>
</html>
